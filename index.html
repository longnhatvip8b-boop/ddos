<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>System Network Console</title>

<style>
body {
  background: black;
  color: #00ff00;
  font-family: monospace;
  padding: 15px;
}

h2 {
  text-align: center;
  font-size: 18px;
}

input, button {
  background: black;
  color: #00ff00;
  border: 1px solid #00ff00;
  padding: 6px;
  font-size: 12px;
}

#log {
  margin-top: 10px;
  border: 1px solid #00ff00;
  height: 260px;
  overflow-y: auto;
  padding: 8px;
  font-size: 12px;
}

#progress-container {
  width: 100%;
  border: 1px solid #00ff00;
  margin-top: 8px;
}

#progress {
  width: 0%;
  height: 14px;
  background: #00ff00;
}

/* HUD dưới */
#hud {
  margin-top: 8px;
  border: 1px solid #00ff00;
  padding: 8px;
  font-size: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
}

#hud span {
  animation: blink 1s infinite alternate;
}

@keyframes blink {
  from { opacity: 1; }
  to { opacity: 0.4; }
}

/* scanline */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  background: repeating-linear-gradient(
    rgba(0,255,0,0.05) 0px,
    rgba(0,255,0,0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}
</style>
</head>

<body>

<h2>☠️LNHAT ATTACK☠️</h2>

<input type="text" id="target" placeholder="link web">
<button onclick="start()">EXECUTE</button>

<div id="progress-container">
  <div id="progress"></div>
</div>

<div id="log"></div>

<div id="hud">
  <div>STATUS: <span id="status">IDLE</span></div>
  <div>PACKETS/s: <span id="pps">0</span></div>
  <div>NODES: <span id="nodes">0</span></div>
  <div>TIME: <span id="time">0s</span></div>
</div>

<script>
let interval;
let progress = 0;
let duration = 600000; // 10 phút
let startTime;
let nodes = 0;

function rand() {
  return Math.floor(Math.random() * 255);
}

function randomIP() {
  return `${rand()}.${rand()}.${rand()}.${rand()}`;
}

const actions = [
  "SYN request",
  "UDP flood",
  "HTTP burst",
  "Packet stream",
  "Handshake override",
  "Port scan",
  "Header inject"
];

function addLog(text) {
  const log = document.getElementById("log");
  const line = document.createElement("div");
  line.textContent = text;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function updateHUD(elapsed) {
  document.getElementById("pps").textContent = Math.floor(Math.random() * 400 + 100);
  document.getElementById("nodes").textContent = nodes;
  document.getElementById("time").textContent = Math.floor(elapsed / 1000) + "s";
}

function start() {
  clearInterval(interval);
  document.getElementById("log").innerHTML = "";
  progress = 0;
  startTime = Date.now();

  let target = document.getElementById("target").value || "server.local";

  document.getElementById("status").textContent = "INITIALIZING";

  addLog("Booting modules...");
  addLog("Resolving target: " + target);
  addLog("Opening channels...");
  addLog("Dispatching nodes...");
  addLog("---- SESSION START ----");

  interval = setInterval(() => {
    let now = Date.now();
    let elapsed = now - startTime;

    let ip = randomIP();
    let action = actions[Math.floor(Math.random() * actions.length)];

    addLog(`[${ip}] -> ${target} : ${action}`);

    nodes = Math.floor(Math.random() * 50 + 50);
    updateHUD(elapsed);

    progress = (elapsed / duration) * 100;
    if (progress > 100) progress = 100;

    document.getElementById("progress").style.width = progress + "%";

    if (progress > 80) {
      document.getElementById("status").textContent = "OVERLOAD";
    }

    if (elapsed >= duration) {
      clearInterval(interval);

      addLog("---- SESSION END ----");
      addLog("Signal degraded...");
      addLog("Response timeout...");
      addLog("Target status: UNSTABLE");
      addLog("Nodes disconnected.");
      addLog("Process terminated.");

      document.getElementById("status").textContent = "TERMINATED";
    }

  }, 120);
}
</script>

</body>
</html>
